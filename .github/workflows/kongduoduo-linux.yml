name: 控多多 - Build Linux (x64)

# 控多多 专用 Linux 编译流程（基于官方 flutter-build.yml 裁剪，只编译 x86_64 deb）

on:
  workflow_dispatch:
    inputs:
      upload-tag:
        description: "Release tag name"
        type: string
        default: "kongduoduo-linux"

env:
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VERSION: "1.4.7"
  UPLOAD_ARTIFACT: "true"
  KDD_RENDEZVOUS_SERVER: "47.116.214.47"
  KDD_RS_PUB_KEY: "TkjdoQL5KIA3PNPCblENVPgcZsruZUnPdIyzOXa32vo="

jobs:
  generate-bridge:
    runs-on: ubuntu-22.04
    env:
      CARGO_EXPAND_VERSION: "1.0.95"
      FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
      BRIDGE_FLUTTER_VERSION: "3.22.3"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Install prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake curl gcc git g++ libclang-dev libgtk-3-dev llvm-dev nasm ninja-build pkg-config wget
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: "rustfmt"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: bridge-ubuntu-22.04
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          flutter-version: ${{ env.BRIDGE_FLUTTER_VERSION }}
          cache: true
      - name: Install flutter rust bridge deps
        shell: bash
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          pushd flutter && sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml && flutter pub get && popd
      - name: Run flutter rust bridge
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/ios/Runner/bridge_generated.h

  build-for-linux:
    name: Build 控多多 Linux x64
    needs: [generate-bridge]
    runs-on: ubuntu-22.04
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Maximize build space
        run: |
          sudo rm -rf /opt/ghc /usr/local/lib/android /usr/share/dotnet
          sudo apt-get update -y
          sudo apt-get install -y nasm qemu-user-static

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: 内嵌「控多多」服务器配置到 config.rs
        shell: bash
        run: |
          CFG="libs/hbb_common/src/config.rs"
          sed -i 's#pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];#pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["'"${KDD_RENDEZVOUS_SERVER}"'"];#' "$CFG"
          sed -i 's#pub const RS_PUB_KEY: &str = ".*";#pub const RS_PUB_KEY: \&str = "'"${KDD_RS_PUB_KEY}"'";#' "$CFG"
          sed -i 's#APP_NAME: RwLock<String> = RwLock::new("RustDesk".to_owned());#APP_NAME: RwLock<String> = RwLock::new("KongDuoDuo".to_owned());#' "$CFG"
          grep -nE 'RENDEZVOUS_SERVERS|RS_PUB_KEY' "$CFG" | head

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@49819abfb41bd9b44fb781159c033dba90353a7c # v1.0
        with:
          swap-size-gb: 12

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: "rustfmt"

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bridge-artifact
          path: ./

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          sudo apt install -y libva-dev
          if ! $VCPKG_ROOT/vcpkg install --triplet x64-linux --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do echo "$_1:"; cat "$_1"; done
            exit 1
          fi
        shell: bash

      - name: Install Linux build deps (native)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y g++ gcc git curl wget nasm yasm ninja-build \
             libgtk-3-dev libxcb-randr0-dev libxdo-dev libxfixes-dev \
             libxcb-shape0-dev libxcb-xfixes0-dev libasound2-dev libpulse-dev \
             libpam0g-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
             libva-dev libclang-dev clang libappindicator3-dev pkg-config tree python3 unzip libssl-dev
          sudo apt-get remove -y libopus-dev || true

      - name: Install Flutter (native)
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch flutter
        shell: bash
        run: |
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff || true

      - name: Build 控多多 (native)
        shell: bash
        run: |
          export VCPKG_ROOT=/opt/artifacts/vcpkg
          export CARGO_INCREMENTAL=0
          export DEB_ARCH=amd64
          python3 ./build.py --flutter
          ls -lh ./*.deb || true
          for name in rustdesk*??.deb; do mv "$name" "kongduoduo-${{ env.VERSION }}-x86_64.deb"; done
          ls -lh kongduoduo-*.deb

      - name: Upload deb
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kongduoduo-linux-x64-deb
          path: kongduoduo-*.deb
